<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Layout</title>

    <style>
        #container {
            width: 100%;
            height: 600px;
            background-color: aqua;
        }

        #header {
            width: 100%;
            height: 100px;
            background-color: red;
        }

        #twoDiv {
            width: 100%;
            height: 400px;
            background-color: orchid;
        }

        #left{
            width: 50%;
            height: 400px;
            background-color: blue;
            float: left;
        }
        #right{
            width: 50%;
            height: 400px;
            background-color: green;
            float: right;
        }


        #footer {
            width: 100%;
            height: 100px;
            background-color: red;
        }
    </style>
</head>

<body>

    <div id="container">

        <div id="header"></div>

        <div id="twoDiv">
            <div id="left"></div>
            <div id="right"></div>
        </div>

      
        <div id="footer"></div>



    </div>

</body>

</html>

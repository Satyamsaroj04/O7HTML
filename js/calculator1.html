<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    min-height:100vh;
    background: linear-gradient(to right,#1e1e1e,#062e30);
    display:flex;
    justify-content:center;
    align-items:center;
}

.calculator{
    width:350px;
    background:#000;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.display input{
    width:100%;
    height:80px;
    font-size:32px;
    text-align:right;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
}

.buttons{
    display:grid;
    grid-template-columns: repeat(4,1fr);
    gap:12px;
    margin-top:20px;
}

button{
    height:60px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#f57c00;
    color:white;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#ff9800;
}

button.operator{
    background:#455a64;
}

button.operator:hover{
    background:#607d8b;
}

button.equal{
    grid-column: span 4;
    background:#2e7d32;
}

button.equal:hover{
    background:#43a047;
}

button.clear{
    background:#c62828;
}

button.clear:hover{
    background:#e53935;
}
</style>
</head>

<body>

<div class="calculator">
    <div class="display">
        <input type="text" id="display" disabled>
    </div>

    <div class="buttons">
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator">/</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operator">*</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="operator">-</button>

        <button>0</button>
        <button>.</button>
        <button class="clear">C</button>
        <button class="operator">+</button>

        <button class="equal">=</button>
    </div>
</div>

<script>
const display = document.getElementById("display");
const buttons = document.querySelectorAll("button");

buttons.forEach(btn=>{
    btn.addEventListener("click",()=>{
        const value = btn.innerText;

        if(value === "C"){
            display.value = "";
        }
        else if(value === "="){
            try{
                display.value = eval(display.value);
            }catch{
                display.value = "Error";
            }
        }
        else{
            display.value += value;
        }
    });
});
</script>

</body>
</html>

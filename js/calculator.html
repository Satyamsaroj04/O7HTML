<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <style>
.css{
    margin: 0%;
    padding: 0%;
    width: 100%;
height: 700px;
background: linear-gradient(to right, #7d7878, #062e30);
}

.calc{
height: 500px; 
width: 400px;
}
.display{
    height: 100px;
    width: 365px;
    font-size: 40px;
}
.entersection{
    height: 360px; 
width: 375px;
}
.buttonS{
     height: 60px;
    width:335px;
}
/* From Uiverse.io by adamgiebl */ 
button {
  color: #090909;
  padding: 0.7em 1.7em;
  font-size: 15px;
  border-radius: 0.5em;
  background: #e8e8e8;
  cursor: pointer;
  border: 1px solid #e8e8e8;
  transition: all 0.3s;
  box-shadow: 4px 4px 4px #c5c5c5, -4px -4px 8px #ffffff;
  width: 60px;
  margin: right 4;
  
}

button:hover {
  border: 1px solid white;
}

button:active {
  box-shadow: 4px 4px 10px #c5c5c5, -4px -4px 10px #ffffff;
}
.equal{
    width: 100%;
}
.black{
    background-color: rgb(255, 127, 17)
}
.skyblue{
   background-color: #062e30 rgb(29, 84, 109)
}
.blackcol{
   background-color: #000000 
}
        </style>
</head>

<body>
<div class="container-fluid bg-dark height d-flex justify-content-center align-items-center css ">
    <div class="row">
<div class="col col-12 blackcol calc p-3 mb-2  text-white rounded">
    <div class="col-10 bg-dark display   text-white rounded d-flex justify-content-center align-items-center ">
        <input type="text" class="display   text-black rounded-2">
    </div>
    <div class="col-12  display p-3 mb-3  text-white rounded entersection button">
         <div class="col-10  buttonS  text-white rounded entersection d-flex justify-content-evenly align-items-center mt-3">
            <!-- From Uiverse.io by adamgiebl --> 
<button class="black">1</button>
<button class="black">2 </button>
<button class="black">3</button>
<button class="black">+</button>



         </div>
         <!-- 2nd -->
         <div class="col-10  buttonS  text-white rounded entersection d-flex justify-content-evenly align-items-center">
            <!-- From Uiverse.io by adamgiebl --> 
<button class="black">4 </button>
<button class="black">5</button>
<button class="black">6</button>
<button class="black">-</button>
         </div>
          <!-- 3rd -->
         <div class="col-10  buttonS  text-white rounded entersection d-flex justify-content-evenly align-items-center">
            <!-- From Uiverse.io by adamgiebl --> 
<button class="black">7 </button>
<button class="black">8</button>
<button class="black">9</button>
<button class="black">*</button>
         </div>
          <!-- 4th -->
         <div class="col-10  buttonS  text-white rounded entersection d-flex justify-content-evenly align-items-center">
            <!-- From Uiverse.io by adamgiebl --> 
<button class="black">. </button>
<button class="black">0</button>
<button class="black">C</button>
<button class="black">/</button>
         </div>
         <!-- 5th -->
         <div class="col-12  buttonS  text-white rounded entersection d-flex justify-content-evenly align-items-center mt-2">
            <!-- From Uiverse.io by adamgiebl --> 
<button class="w-75 black">= </button>

         </div>
        
        
    </div>

</div>


    </div>

</div>

 <script>
    // Get the display input
    const display = document.querySelector(".display input");

    // Get all buttons
    const buttons = document.querySelectorAll("button");

    // Loop through buttons and add click event
    buttons.forEach(button => {
        button.addEventListener("click", () => {
            const value = button.textContent.trim();

            if (value === "C") {
                // Clear display
                display.value = "";
            } else if (value === "=") {
                try {
                    // Evaluate the expression
                    display.value = eval(display.value);
                } catch {
                    display.value = "Error";
                }
            } else {
                // Append button value to display
                display.value += value;
            }
        });
    });
</script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Clock Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Bebas Neue", sans-serif;
      transition: background 1s ease-in-out;
      color: white;
    }

    .dashboard {
      text-align: center;
    }

    #timeHeading {
      font-size: 6rem;
      letter-spacing: 4px;
      text-shadow: 0px 0px 15px rgba(0, 255, 255, 0.7);
    }

    #dateHeading {
      font-size: 2rem;
      margin-top: 10px;
      opacity: 0.9;
    }

    #greeting {
      font-size: 2.5rem;
      margin-top: 15px;
      color: #ffcc00;
    }

    #weather {
      font-size: 1.5rem;
      margin-top: 20px;
      opacity: 0.85;
    }

    .analog-clock {
      margin: 30px auto;
      width: 200px;
      height: 200px;
      border: 8px solid white;
      border-radius: 50%;
      position: relative;
    }

    .hand {
      width: 50%;
      height: 2px;
      background: white;
      position: absolute;
      top: 50%;
      transform-origin: 100%;
      transform: rotate(90deg);
      transition: transform 0.5s ease-in-out;
    }

    .hand.hour {
      height: 4px;
      background: #ffcc00;
    }

    .hand.minute {
      background: #00ffcc;
    }

    .hand.second {
      background: #ff0066;
      height: 1px;
    }
  </style>
</head>

<body>
  <div class="dashboard">
    <h1 id="timeHeading"></h1>
    <h2 id="dateHeading"></h2>
    <h2 id="greeting"></h2>
    <div class="analog-clock">
      <div class="hand hour" id="hourHand"></div>
      <div class="hand minute" id="minuteHand"></div>
      <div class="hand second" id="secondHand"></div>
    </div>
    <h3 id="weather"></h3>
  </div>

  <script>
    async function fetchWeather() {
      try {
        // Example: OpenWeatherMap API (replace YOUR_API_KEY with your key)
        let response = await fetch("https://api.openweathermap.org/data/2.5/weather?q=Jalandhar&units=metric&appid=YOUR_API_KEY");
        let data = await response.json();
        let temp = Math.round(data.main.temp);
        let condition = data.weather[0].description;
        document.getElementById("weather").innerHTML = `🌡️ ${temp}°C | ${condition}`;
      } catch (error) {
        document.getElementById("weather").innerHTML = "Weather unavailable";
      }
    }

    function updateClock() {
      let d = new Date();

      // Digital clock
      let hours = d.getHours();
      let minutes = d.getMinutes();
      let seconds = d.getSeconds();
      let ampm = hours >= 12 ? "PM" : "AM";

      let greeting = hours < 12 ? "☀️ Good Morning" :
        hours < 18 ? "🌤️ Good Afternoon" : "🌙 Good Evening";

      hours = hours % 12;
      hours = hours ? hours : 12;

      minutes = minutes < 10 ? "0" + minutes : minutes;
      seconds = seconds < 10 ? "0" + seconds : seconds;

      let timeString = `${hours}:${minutes}:${seconds} ${ampm}`;
      let dateString = d.toLocaleDateString("en-US", { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

      document.getElementById("timeHeading").innerHTML = timeString;
      document.getElementById("dateHeading").innerHTML = dateString;
      document.getElementById("greeting").innerHTML = greeting;

      // Analog clock
      let hourDeg = (d.getHours() % 12) * 30 + d.getMinutes() * 0.5;
      let minuteDeg = d.getMinutes() * 6;
      let secondDeg = d.getSeconds() * 6;

      document.getElementById("hourHand").style.transform = `rotate(${hourDeg}deg)`;
      document.getElementById("minuteHand").style.transform = `rotate(${minuteDeg}deg)`;
      document.getElementById("secondHand").style.transform = `rotate(${secondDeg}deg)`;

      // Dynamic background
      let hour = d.getHours();
      if (hour >= 6 && hour < 12) {
        document.body.style.background = "linear-gradient(to right, #ffcc00, #ff6600)";
      } else if (hour >= 12 && hour < 18) {
        document.body.style.background = "linear-gradient(to right, #00c6ff, #0072ff)";
      } else if (hour >= 18 && hour < 21) {
        document.body.style.background = "linear-gradient(to right, #ff9966, #ff5e62)";
      } else {
        document.body.style.background = "linear-gradient(to right, #000000, #1f1362)";
      }
    }

    setInterval(updateClock, 1000);
    updateClock();
    fetchWeather();
  </script>
</body>

</html>

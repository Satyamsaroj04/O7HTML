<script>
    console.log("printing 2 table using for loop")
    let table = 2
    for (i = 1; i <= 10; i++) {
       let a = table + " * " + i + " = " + (table * i) + "\n"
        document.getElementById("tablePrint").innerText += a;
    }


</script>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* HERO SECTION */
        .NetflixParent {
            width: 100%;
            height: 100vh;
            background: url('https://wallpapercave.com/wp/wp15747910.jpg') center/cover no-repeat;
            color: white;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 20px 40px;
            font-family: Arial, sans-serif;
        }

        .NetflixParent h1 {
            margin: 0;
            font-size: 3em;
            color: red;
            font-weight: bold;
        }

        .items {
            display: flex;
            gap: 25px;
        }

        .items h6 {
            margin: 0;
            cursor: pointer;
        }

        .items h6:hover {
            text-decoration: underline;
        }

        /* TRENDING SECTION */
        .TRENDING {
            width: 100%;
            min-height: 100vh;
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
        }

        .SERIESHEADING {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
        }

        /* CENTER CARDS */
        .SKYBLUEIV {
            min-height: calc(100vh - 80px);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
            padding: 30px;
        }

        .card {
            width: 22rem;
            background-color: rgb(20, 20, 20);
            color: white;
            border: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 254, 254, 0.861);
        }

        .card img {
            height: 300px;
            object-fit: cover;
        }

        .btn-primary {
            background-color: red;
            border: none;
        }

        .btn-primary:hover {
            background-color: darkred;
        }
    </style>
</head>

<body>

    <!-- HERO -->
    <div class="NetflixParent">
        <h1>NETFLIX</h1>
        <div class="items">
            <h6>HOME</h6>
            <h6>SERIES</h6>
            <h6>MOVIES</h6>
            <h6>NEW & POPULAR</h6>
            <h6>MY LIST</h6>
        </div>
    </div>

    <!-- TRENDING -->
    <div class="TRENDING">
        <div class="SERIESHEADING">TRENDING SERIES</div>

        <div class="SKYBLUEIV">

            <!-- CARD 1 -->
            <div class="card">
                <img src="https://wallpapercave.com/wp/wp6581266.jpg" class="card-img-top" alt="Money Heist">
                <div class="card-body text-center">
                    <h5 class="card-title">MONEY HEIST</h5>
                    <a href="https://youtu.be/_InqQJRqGW4" target="_blank" class="btn btn-primary mt-2">WATCH</a>
                </div>
            </div>

            <!-- CARD 2 -->
            <div class="card">
                <img src="https://wallpapercave.com/uwp/uwp3867921.jpeg" class="card-img-top" alt="The Witcher">
                <div class="card-body text-center">
                    <h5 class="card-title">THE WITCHER</h5>
                    <a href="https://youtu.be/_InqQJRqGW4" target="_blank" class="btn btn-primary mt-2">WATCH</a>
                </div>
            </div>

            <!-- CARD 3 -->
            <div class="card">
                <img src="https://wallpapercave.com/dwp2x/wp9761345.jpg" class="card-img-top" alt="Dark">
                <div class="card-body text-center">
                    <h5 class="card-title">DARK</h5>
                    <a href="https://youtu.be/_InqQJRqGW4" target="_blank" class="btn btn-primary mt-2">WATCH</a>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

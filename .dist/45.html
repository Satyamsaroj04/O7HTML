<script>
// Enhanced mobile detection with orientation support
const isMobile = () => {
    return window.innerWidth <= 768 || 
           ('ontouchstart' in window) || 
           (navigator.maxTouchPoints > 0);
};

let mobileMode = isMobile();

// Performance throttle for mobile
const throttle = (func, limit) => {
    let inThrottle;
    return function() {
        const args = arguments;
        const context = this;
        if (!inThrottle) {
            func.apply(context, args);
            inThrottle = true;
            setTimeout(() => inThrottle = false, limit);
        }
    };
};

// Initialize the page
function initPage() {
    // Mark as loaded
    document.body.classList.add('js-loaded');
    
    // Initialize components
    initThemeToggle();
    initMobileMenu();
    initTypingEffect();
    initSmoothScrolling();
    initMobileOptimizations();
    
    // Initialize 3D only on desktop
    if (!mobileMode) {
        initThreeJS();
    }
    
    // Setup event listeners
    setupEventListeners();
    
    // Initial animations
    runInitialAnimations();
}

// NEW: Enhanced Mobile Optimizations
function initMobileOptimizations() {
    if (!mobileMode) return;
    
    // Disable heavy effects on mobile
    document.getElementById('three-container').style.display = 'none';
    
    // Simplify animations for mobile
    gsap.defaults({
        duration: 0.4,
        ease: "power2.out"
    });
    
    // Reduce parallax and complex effects
    ScrollTrigger.config({
        limitCallbacks: true,
        ignoreMobileResize: true
    });
    
    // Touch feedback for interactive elements
    document.querySelectorAll('a, button, .project, .skill-card').forEach(el => {
        el.style.cursor = 'pointer';
        el.addEventListener('touchstart', function() {
            this.style.transform = 'scale(0.98)';
        });
        el.addEventListener('touchend', function() {
            this.style.transform = 'scale(1)';
        });
    });
}

// ENHANCED: Better mobile menu with backdrop
function initMobileMenu() {
    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');
    const menuBackdrop = document.getElementById('menuBackdrop');
    
    if (!menuToggle) return;
    
    function toggleMenu() {
        const isActive = navLinks.classList.toggle('active');
        menuToggle.innerHTML = isActive 
            ? '<i class="fas fa-times"></i>' 
            : '<i class="fas fa-bars"></i>';
        menuBackdrop.classList.toggle('active');
        document.body.style.overflow = isActive ? 'hidden' : '';
    }
    
    menuToggle.addEventListener('click', toggleMenu);
    menuBackdrop.addEventListener('click', toggleMenu);
    
    // Close menu on link click
    document.querySelectorAll('.nav-links a').forEach(link => {
        link.addEventListener('click', () => {
            if (window.innerWidth <= 768) {
                toggleMenu();
            }
        });
    });
    
    // Close menu on escape key
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && navLinks.classList.contains('active')) {
            toggleMenu();
        }
    });
}

// NEW: Enhanced smooth scrolling for mobile
function initSmoothScrolling() {
    // Use native smooth scroll for better mobile performance
    if ('scrollBehavior' in document.documentElement.style) {
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const targetId = this.getAttribute('href');
                if (targetId === '#') return;
                
                const targetElement = document.querySelector(targetId);
                if (targetElement) {
                    targetElement.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });
    }
}

// ENHANCED: Typing effect with mobile optimization
function initTypingEffect() {
    if (mobileMode) {
        // Simplified typing for mobile
        const typingText = document.getElementById('typing-text');
        typingText.textContent = "CREATIVE DEVELOPER";
        return;
    }
    
    // Desktop version
    class TypingEffect {
        constructor() {
            this.texts = [
                "WEB DEVELOPER",
                "FRONTEND DEVELOPER", 
                "JAVA DEVELOPER",
                "UI/UX DESIGNER",
                "CREATIVE CODER",
                "C / C++ PROGRAMMER"
            ];
            this.currentTextIndex = 0;
            this.currentCharIndex = 0;
            this.isDeleting = false;
            this.isPaused = false;
            this.pauseTime = 800;
            this.typeSpeed = 70;
            this.deleteSpeed = 40;
            this.typingText = document.getElementById('typing-text');
            this.cursor = document.getElementById('typing-cursor');
            this.startTyping();
        }

        startTyping() {
            setTimeout(() => this.type(), 1000);
        }

        type() {
            if (this.isPaused) {
                setTimeout(() => {
                    this.isPaused = false;
                    this.type();
                }, this.pauseTime);
                return;
            }

            const currentText = this.texts[this.currentTextIndex];
            
            if (this.isDeleting) {
                this.currentCharIndex--;
                this.typingText.textContent = currentText.substring(0, this.currentCharIndex);
                
                if (this.currentCharIndex === 0) {
                    this.isDeleting = false;
                    this.currentTextIndex = (this.currentTextIndex + 1) % this.texts.length;
                    this.isPaused = false;
                    this.typeSpeed = 70;
                    this.deleteSpeed = 40;
                }
                
                setTimeout(() => this.type(), this.deleteSpeed);
            } else {
                this.currentCharIndex++;
                this.typingText.textContent = currentText.substring(0, this.currentCharIndex);
                
                if (!mobileMode && this.currentCharIndex % 3 === 0) {
                    document.getElementById('three-container').classList.add('intense');
                    setTimeout(() => {
                        document.getElementById('three-container').classList.remove('intense');
                    }, 100);
                }
                
                if (this.currentCharIndex === currentText.length) {
                    this.isDeleting = true;
                    this.isPaused = true;
                    this.pauseTime = 600;
                }
                
                setTimeout(() => this.type(), this.typeSpeed);
            }
        }
    }
    
    new TypingEffect();
}

// ENHANCED: Theme toggle with system preference
function initThemeToggle() {
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('i');
    
    // Check system preference
    const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)');
    
    // Check saved theme or system preference
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light' || (!savedTheme && !prefersDarkScheme.matches)) {
        document.body.classList.add('light-mode');
        themeIcon.classList.remove('fa-moon');
        themeIcon.classList.add('fa-sun');
    }
    
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('light-mode');
        
        if (document.body.classList.contains('light-mode')) {
            themeIcon.classList.remove('fa-moon');
            themeIcon.classList.add('fa-sun');
            localStorage.setItem('theme', 'light');
        } else {
            themeIcon.classList.remove('fa-sun');
            themeIcon.classList.add('fa-moon');
            localStorage.setItem('theme', 'dark');
        }
    });
}

// ENHANCED: Setup all event listeners
function setupEventListeners() {
    // Handle resize with debouncing
    let resizeTimeout;
    window.addEventListener('resize', throttle(() => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
            const newMobileMode = isMobile();
            if (newMobileMode !== mobileMode) {
                mobileMode = newMobileMode;
                location.reload(); // Reload for major changes
            } else {
                ScrollTrigger.refresh();
            }
        }, 250);
    }, 100));
    
    // Enhanced scroll progress
    window.addEventListener('scroll', throttle(() => {
        const scrollProgress = document.querySelector('.scroll-progress');
        const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
        const scrollPercent = (window.scrollY / scrollHeight) * 100;
        scrollProgress.style.width = `${scrollPercent}%`;
        
        // Navbar effect
        const navbar = document.getElementById('navbar');
        if (window.scrollY > 50) {
            navbar.classList.add('scrolled');
        } else {
            navbar.classList.remove('scrolled');
        }
    }, 50));
    
    // Handle resume download
    const cvBtn = document.getElementById('cvBtn');
    const resumeOverlay = document.getElementById('resumeOverlay');
    
    cvBtn.addEventListener('click', () => {
        resumeOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
        
        setTimeout(() => {
            resumeOverlay.classList.remove('active');
            document.body.style.overflow = '';
            
            // Show download notification
            showNotification('Resume Downloaded Successfully!', 'check-circle');
        }, 1500);
    });
    
    // Gallery modal handling
    initGalleryModal();
    
    // Active nav link highlighting
    updateActiveNavLink();
    window.addEventListener('scroll', throttle(updateActiveNavLink, 100));
}

// NEW: Show notification function
function showNotification(message, icon = 'check-circle') {
    const notification = document.createElement('div');
    notification.className = 'notification';
    notification.style.cssText = `
        position: fixed;
        top: 30px;
        right: 30px;
        background: rgba(5, 10, 20, 0.95);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(74, 142, 255, 0.4);
        padding: 15px 25px;
        border-radius: 10px;
        z-index: 100000;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 14px;
        letter-spacing: 1px;
        transform: translateX(120%);
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        color: #4a8eff;
        display: flex;
        align-items: center;
        gap: 10px;
    `;
    
    notification.innerHTML = `<i class="fas fa-${icon}" style="font-size: 16px;"></i>${message}`;
    document.body.appendChild(notification);
    
    setTimeout(() => {
        notification.style.transform = 'translateX(0)';
    }, 10);
    
    setTimeout(() => {
        notification.style.transform = 'translateX(120%)';
        setTimeout(() => {
            document.body.removeChild(notification);
        }, 400);
    }, 3000);
}

// NEW: Update active nav link
function updateActiveNavLink() {
    const sections = document.querySelectorAll('section');
    const navLinks = document.querySelectorAll('.nav-links a');
    
    let current = '';
    sections.forEach(section => {
        const sectionTop = section.offsetTop;
        const sectionHeight = section.clientHeight;
        if (window.scrollY >= (sectionTop - 200)) {
            current = section.getAttribute('id');
        }
    });
    
    navLinks.forEach(link => {
        link.classList.remove('active');
        if (link.dataset.section === current) {
            link.classList.add('active');
        }
    });
}

// ENHANCED: Gallery modal with touch support
function initGalleryModal() {
    const galleryModal = document.getElementById('galleryModal');
    const modalImg = document.getElementById('modalImg');
    const modalTitle = document.getElementById('modalTitle');
    const modalClose = document.querySelector('.modal-close');
    
    if (!galleryModal) return;
    
    document.querySelectorAll('.gallery-item').forEach(item => {
        item.addEventListener('click', () => {
            const imgSrc = item.querySelector('img').src;
            const title = item.querySelector('.gallery-title').textContent;
            
            modalImg.src = imgSrc;
            modalTitle.textContent = title;
            
            galleryModal.classList.add('active');
            document.body.style.overflow = 'hidden';
        });
    });
    
    // Close modal
    function closeModal() {
        galleryModal.classList.remove('active');
        document.body.style.overflow = '';
    }
    
    modalClose.addEventListener('click', closeModal);
    galleryModal.addEventListener('click', (e) => {
        if (e.target === galleryModal) closeModal();
    });
    
    // Close on escape
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && galleryModal.classList.contains('active')) {
            closeModal();
        }
    });
}

// NEW: Run initial animations
function runInitialAnimations() {
    gsap.from('nav', {
        y: -40,
        opacity: 0,
        duration: mobileMode ? 0.6 : 1,
        delay: 0.2,
        ease: "power3.out"
    });
    
    gsap.to('body', {
        opacity: 1,
        duration: 0.4,
        from: { opacity: 0 }
    });
    
    // Mobile-specific animations
    if (mobileMode) {
        // Simplified hero animation for mobile
        gsap.from(".hero-sub", {
            opacity: 0,
            y: 20,
            duration: 0.8,
            delay: 0.3,
            ease: "power3.out"
        });
        
        gsap.from("#typing-text", {
            opacity: 0,
            y: 30,
            duration: 1,
            delay: 0.5,
            ease: "power3.out"
        });
        
        gsap.from(".hero-desc", {
            opacity: 0,
            y: 20,
            duration: 0.8,
            delay: 0.8,
            ease: "power3.out"
        });
        
        gsap.from(".cta-buttons", {
            opacity: 0,
            y: 20,
            duration: 0.8,
            delay: 1,
            ease: "power3.out"
        });
    }
}

// Initialize on DOM ready
document.addEventListener('DOMContentLoaded', initPage);

// Cleanup on page unload
window.addEventListener('beforeunload', () => {
    ScrollTrigger.getAll().forEach(trigger => trigger.kill());
    if (window.THREE) {
        // Clean up Three.js resources if they exist
        const container = document.getElementById('three-container');
        if (container) {
            container.innerHTML = '';
        }
    }
});
</script>

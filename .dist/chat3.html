<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bootstrap Layout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body{ margin:0; }

    .table3{ height:100vh; }

    .header{ height:20%; }
    .content{ height:60%; }
    .footer{ height:20%; }

    .h-50{ height:50%; }
</style>
</head>

<body>

<div class="table3 container-fluid p-0">

    <!-- 1 -->
    <div class="row h-20">
        <div class="col-12 header bg-danger d-flex justify-content-center align-items-center">
            1
        </div>
    </div>

    <!-- Middle Section -->
    <div class="row content">

        <!-- 2 -->
        <div class="col-2 bg-warning d-flex justify-content-center align-items-center">
            2
        </div>

        <!-- 3 & 4 -->
        <div class="col-8 p-0">
            <div class="row h-50 bg-info d-flex justify-content-center align-items-center">
                3
            </div>
            <div class="row h-50 bg-success d-flex justify-content-center align-items-center">
                4
            </div>
        </div>

        <!-- 5 -->
        <div class="col-2 bg-primary text-white d-flex justify-content-center align-items-center">
            5
        </div>

    </div>

    <!-- Bottom -->
    <div class="row footer">
        <div class="col-8 bg-dark text-white d-flex justify-content-center align-items-center">
            6
        </div>
        <div class="col-4 bg-secondary d-flex justify-content-center align-items-center">
            7
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

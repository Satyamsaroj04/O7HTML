<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator UI</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }

        .calculator {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Main calculator */
        .container {
            width: 320px;
            background-color: #ffffff;
            border-radius: 25px;
            padding: 20px 20px 15px;
            border: 3px solid #000;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            height: auto; /* 🔥 bottom space fix */
        }

        /* Display */
        .header {
            width: 100%;
            height: 80px;
            background-color: #000;
            border-radius: 15px;
            border: 2px solid #555;
            margin-bottom: 15px;
        }

        /* Button rows */
        .container1 {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        /* Normal buttons */
        .cont {
            width: 65px;
            height: 65px;
            background-color: #b9b9b7;
            font-size: 30px;
            border-radius: 50%;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Clear button */
        .contc {
            width: 65px;
            height: 65px;
            background-color: #b51f1f;
            font-size: 30px;
            border-radius: 50%;
            border: 2px solid darkred;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Equal button */
        .lower {
            width: 100%;
            height: 70px;
            background-color: #b51f1f;
            font-size: 35px;
            border-radius: 15px;
            border: 3px solid rgb(233, 153, 14);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-bottom: 0; /* 🔥 no space */
        }

        /* Hover */
        .cont:hover,
        .contc:hover,
        .lower:hover {
            transform: scale(1.05);
            transition: 0.2s;
        }
    </style>
</head>

<body>

    <div class="calculator">
        <div class="container">

            <!-- Display -->
            <div class="header"></div>

            <!-- Row 1 -->
            <div class="container1">
                <div class="cont">7</div>
                <div class="cont">8</div>
                <div class="cont">9</div>
                <div class="cont">/</div>
            </div>

            <!-- Row 2 -->
            <div class="container1">
                <div class="cont">4</div>
                <div class="cont">5</div>
                <div class="cont">6</div>
                <div class="cont">*</div>
            </div>

            <!-- Row 3 -->
            <div class="container1">
                <div class="cont">1</div>
                <div class="cont">2</div>
                <div class="cont">3</div>
                <div class="cont">-</div>
            </div>

            <!-- Row 4 -->
            <div class="container1">
                <div class="cont">.</div>
                <div class="cont">0</div>
                <div class="cont">+</div>
                <div class="contc">C</div>
            </div>

            <!-- Equal -->
            <div class="lower">=</div>

        </div>
    </div>

</body>
</html>

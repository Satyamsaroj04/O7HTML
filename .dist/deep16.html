<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satyam Saroj — Creative Developer</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&family=Space+Grotesk:wght@300;400;600&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
/* ================= GLOBAL ================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    background: #000;
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    overflow-x: hidden;
}

/* ================= BACKGROUND ================= */
.gradient-bg {
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 30% 50%, rgba(74,142,255,0.25), transparent 60%),
        linear-gradient(135deg, #000 0%, #050b18 100%);
    z-index: 0;
}

/* ================= NAVBAR ================= */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 28px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    backdrop-filter: blur(20px);
    z-index: 10;
}

.logo {
    font-family: 'Syncopate', sans-serif;
    font-size: 22px;
    letter-spacing: 5px;
    font-weight: 700;
    background: linear-gradient(135deg, #fff, #4a8eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.nav-right {
    display: flex;
    align-items: center;
    gap: 25px;
}

.nav-links a {
    text-decoration: none;
    color: rgba(255,255,255,0.8);
    font-size: 13px;
    letter-spacing: 2px;
}

/* ================= THEME TOGGLE ================= */
.theme-toggle {
    background: none;
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 8px 12px;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
}

/* ================= HERO ================= */
.hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: 0 70px;
    position: relative;
    z-index: 2;
}

.hero-sub {
    font-family: 'Syncopate', sans-serif;
    letter-spacing: 6px;
    font-size: 14px;
    color: #4a8eff;
    margin-bottom: 20px;
}

/* 🔥 FIXED TYPING SIZE */
.hero-title {
    font-family: 'Archivo', sans-serif;
    font-size: clamp(3rem, 6vw, 5.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, #fff, #4a8eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.type-cursor {
    display: inline-block;
    width: 3px;
    height: 1em;
    background: #4a8eff;
    margin-left: 6px;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

.hero-desc {
    margin-top: 25px;
    max-width: 600px;
    font-size: 1.2rem;
    color: rgba(255,255,255,0.85);
}

/* ================= DARK MODE ================= */
body.dark {
    background: #000;
}

body.dark * {
    color: #fff !important;
    background: transparent !important;
    box-shadow: none !important;
    text-shadow: none !important;
}

body.dark .gradient-bg {
    filter: grayscale(100%);
}

/* ================= RESPONSIVE ================= */
@media(max-width:768px) {
    .hero {
        padding: 0 30px;
    }
}
</style>
</head>

<body>

<div class="gradient-bg"></div>

<nav>
    <div class="logo">SATYAM SAROJ</div>
    <div class="nav-right">
        <div class="nav-links">
            <a href="#">ABOUT</a>
            <a href="#">WORK</a>
            <a href="#">SKILLS</a>
        </div>
        <button class="theme-toggle" id="themeToggle">🌙</button>
    </div>
</nav>

<section class="hero">
    <div>
        <div class="hero-sub">EDITORIAL × DEVELOPER</div>
        <h1 class="hero-title" id="typing-text"></h1>
        <span class="type-cursor"></span>
        <p class="hero-desc">
            Frontend Developer with a passion for clean UI, smooth animations, and premium editorial design.
        </p>
    </div>
</section>

<script>
/* ================= TYPING EFFECT (NO GAP) ================= */
class TypingEffect {
    constructor() {
        this.words = [
            "WEB DEVELOPER",
            "FRONTEND DEVELOPER",
            "JAVA DEVELOPER",
            "UI/UX DEVELOPER"
        ];
        this.index = 0;
        this.char = 0;
        this.deleting = false;
        this.speed = 90;
        this.deleteSpeed = 130;
        this.el = document.getElementById("typing-text");
        this.type();
    }

    type() {
        const word = this.words[this.index];

        if (!this.deleting) {
            this.char++;
            this.el.textContent = word.slice(0, this.char);
            if (this.char === word.length) {
                this.deleting = true;
            }
        } else {
            this.char--;
            this.el.textContent = word.slice(0, this.char);
            if (this.char === 0) {
                this.deleting = false;
                this.index = (this.index + 1) % this.words.length;
            }
        }

        setTimeout(() => this.type(), this.deleting ? this.deleteSpeed : this.speed);
    }
}

new TypingEffect();

/* ================= THEME TOGGLE ================= */
const toggle = document.getElementById("themeToggle");

toggle.addEventListener("click", () => {
    document.body.classList.toggle("dark");
    toggle.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineVue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .height {
            height: 600px;
        }
        .height1 {
            height: 70px;
        }
        .height2 {
            height: 530px;
        }

        .carousel-item {
            height: 530px;
        }
        .carousel-item img {
            height: 100%;
            width: 100%;
            object-fit: cover;
        }
    </style>
</head>

<body>


    <div class="container-fluid height p-0">

        <!-- Row -->
        <div class="row m-0">

            <!-- Navbar -->
            <div class=" col-12 bg-dark height1">
                <nav class="navbar navbar-expand-lg bg-dark height1  ">
                    <div class="container-fluid">
                        <a class="navbar-brand text-danger" href="#">
                            <p class="fw-bold m-3">CineVue</p>
                        </a>
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                            data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false"
                            aria-label="Toggle navigation">
                            <span class="navbar-toggler-icon"></span>
                        </button>
                        <div class="collapse navbar-collapse  " id="navbarNav">
                            <ul class="navbar-nav ms-auto">
                                <li class="nav-item">
                                    <a class="nav-link active text-light" aria-current="page" href="#">Home</a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link text-light" href="#">About</a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link text-light" href="#">Contact</a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link disabled text-light" aria-disabled="true">Login</a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </nav>
            </div>

            <!-- col 1 -->
            <div class="col-md-12 bg-primary height2 p-0">

                <div id="carouselExample" class="carousel slide h-100" data-bs-ride="carousel">

                    <div class="carousel-inner h-100">

                        <!-- Slide 1 -->
                        <div class="carousel-item active">
                            <img src="https://wallpapercave.com/wp/wp14786446.jpg" alt="Dune">
                            <div class="carousel-caption d-none d-md-block">
                                <h1>DUNE</h1>
                                <p>Some representative placeholder content</p>
                            </div>
                        </div>

                        <!-- Slide 2 -->
                        <div class="carousel-item">
                            <img src="https://wallpapercave.com/wp/wp10815292.jpg" alt="Movie">
                            <div class="carousel-caption d-none d-md-block">
                                <h1>JOHN WICK</h1>
                                <p>Some representative placeholder content for the first slide.</p>
                            </div>
                        </div>

                        <!-- Slide 3 -->
                        <div class="carousel-item">
                            <img src="https://wallpapercave.com/wp/wp14951631.webp" alt="Cinema">
                            <div class="carousel-caption d-none d-md-block">
                                <h1>GODZILLA</h1>
                                <p>Some representative placeholder content for the third slide.</p>
                            </div>
                        </div>

                    </div>


                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon"></span>
                    </button>

                    <button class="carousel-control-next" type="button" data-bs-target="#carouselExample"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon"></span>
                    </button>

                </div>

            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>

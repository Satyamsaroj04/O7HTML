/* Updated 3D Container Styles */
#three-container {
    position: fixed;
    inset: 0;
    z-index: 1;
    opacity: 0.9;
    pointer-events: none;
    transition: opacity 1.2s cubic-bezier(0.23, 1, 0.32, 1);
    filter: brightness(1.2) contrast(1.1) saturate(1.1);
}

#three-container.hidden {
    opacity: 0;
}

#three-container.intense {
    opacity: 0.98;
    filter: brightness(1.4) contrast(1.3) saturate(1.3);
}

/* ... (Rest of existing CSS remains the same) ... */

<body>

<div class="gradient-bg"></div>
<div class="noise-overlay"></div>
<div class="cursor-dot"></div>
<div class="cursor-ring"></div>
<div class="scroll-progress"></div>

<!-- Enhanced 3D Background Container -->
<div id="three-container"></div>

<div class="ui">

</div>

<div class="resume-overlay" id="resumeOverlay">
    <div class="loader"></div>
    <div class="resume-text">OPENING RESUME…</div>
</div>

<script>
// Mobile detection
const isMobile = window.innerWidth <= 768;

// NEW: Enhanced 3D Background with 6 Models and Sequential Transitions
let scene, camera, renderer, controls;
let currentMainModel = null;
let models = [];
let modelIndex = 0;
let time = 0;
let isTransitioning = false;

// Enhanced Model configurations - 6 different 3D shapes with varied colors
const modelConfigs = [
    { 
        type: 'torusKnot', 
        color: 0x4a8eff, 
        wireframe: true, 
        emissiveIntensity: 0.5,
        opacity: 0.3,
        size: 8,
        speed: 0.5,
        rotationSpeed: 0.8
    },
    { 
        type: 'dodecahedron', 
        color: 0xff4a8e, 
        wireframe: false, 
        emissiveIntensity: 0.45,
        opacity: 0.28,
        size: 10,
        speed: 0.6,
        rotationSpeed: 0.6
    },
    { 
        type: 'octahedron', 
        color: 0x8eff4a, 
        wireframe: true, 
        emissiveIntensity: 0.5,
        opacity: 0.32,
        size: 12,
        speed: 0.4,
        rotationSpeed: 0.7
    },
    { 
        type: 'cone', 
        color: 0xff8e4a, 
        wireframe: false, 
        emissiveIntensity: 0.4,
        opacity: 0.26,
        size: 14,
        speed: 0.7,
        rotationSpeed: 0.5
    },
    { 
        type: 'cylinder', 
        color: 0x8e4aff, 
        wireframe: true, 
        emissiveIntensity: 0.55,
        opacity: 0.34,
        size: 9,
        speed: 0.65,
        rotationSpeed: 0.9
    },
    { 
        type: 'tetrahedron', 
        color: 0x4aff8e, 
        wireframe: false, 
        emissiveIntensity: 0.48,
        opacity: 0.3,
        size: 11,
        speed: 0.55,
        rotationSpeed: 0.75
    }
];

// Initialize Three.js only on desktop
if (!isMobile && window.innerWidth > 768) {
    initThreeJS();
}

function initThreeJS() {
    scene = new THREE.Scene();
    
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 35;
    
    renderer = new THREE.WebGLRenderer({ 
        alpha: true, 
        antialias: true,
        powerPreference: "high-performance"
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);
    document.getElementById('three-container').appendChild(renderer.domElement);
    
    updateLighting();
    createMainModels();
    createSmallFloatingModels();
    
    if (models.length > 0) {
        showModel(0);
    }
    
    if (window.innerWidth > 992) {
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableZoom = false;
        controls.enablePan = false;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.25;
        controls.enableDamping = true;
        controls.dampingFactor = 0.04;
    }
    
    window.addEventListener('resize', onWindowResize);
    
    // Start sequential model transitions
    startModelTransitions();
    
    animateThreeJS();
}

function createSmallFloatingModels() {
    // Create small floating particles
    const particleCount = 30;
    const particleGeometry = new THREE.SphereGeometry(0.3, 8, 8);
    
    for (let i = 0; i < particleCount; i++) {
        const material = new THREE.MeshBasicMaterial({
            color: Math.random() * 0xffffff,
            transparent: true,
            opacity: 0.4
        });
        
        const particle = new THREE.Mesh(particleGeometry, material);
        
        particle.position.x = (Math.random() - 0.5) * 60;
        particle.position.y = (Math.random() - 0.5) * 60;
        particle.position.z = (Math.random() - 0.5) * 60;
        
        particle.userData = {
            speed: 0.2 + Math.random() * 0.3,
            phase: Math.random() * Math.PI * 2,
            amplitude: 2 + Math.random() * 3
        };
        
        scene.add(particle);
    }
}

function updateLighting() {
    scene.children = scene.children.filter(child => !(child instanceof THREE.Light));
    
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);
    
    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(10, 10, 10);
    scene.add(directionalLight);
    
    // Add colored point lights
    const colors = [0x4a8eff, 0xff4a8e, 0x8eff4a, 0xff8e4a, 0x8e4aff, 0x4aff8e];
    colors.forEach((color, i) => {
        const angle = (i / colors.length) * Math.PI * 2;
        const pointLight = new THREE.PointLight(color, 0.3, 80);
        pointLight.position.set(
            Math.cos(angle) * 25,
            Math.sin(angle) * 25,
            15
        );
        scene.add(pointLight);
    });
}

function createMainModels() {
    models.forEach(model => scene.remove(model.mesh));
    models = [];
    
    modelConfigs.forEach((config, index) => {
        let geometry;
        
        switch(config.type) {
            case 'torusKnot':
                geometry = new THREE.TorusKnotGeometry(config.size, 1, 128, 16);
                break;
            case 'dodecahedron':
                geometry = new THREE.DodecahedronGeometry(config.size, 1);
                break;
            case 'octahedron':
                geometry = new THREE.OctahedronGeometry(config.size, 2);
                break;
            case 'cone':
                geometry = new THREE.ConeGeometry(config.size, config.size * 2, 32);
                break;
            case 'cylinder':
                geometry = new THREE.CylinderGeometry(config.size, config.size, config.size * 2, 32);
                break;
            case 'tetrahedron':
                geometry = new THREE.TetrahedronGeometry(config.size, 1);
                break;
        }
        
        const material = new THREE.MeshStandardMaterial({ 
            color: config.color,
            wireframe: config.wireframe,
            emissive: config.color,
            emissiveIntensity: config.emissiveIntensity,
            metalness: 0.8,
            roughness: 0.2,
            transparent: true,
            opacity: config.opacity,
            side: THREE.DoubleSide
        });
        
        const mesh = new THREE.Mesh(geometry, material);
        mesh.visible = false;
        
        // Position models in a circular pattern
        const angle = (index / modelConfigs.length) * Math.PI * 2;
        mesh.position.x = Math.cos(angle) * 15;
        mesh.position.y = Math.sin(angle) * 10;
        mesh.position.z = Math.sin(angle * 2) * 5;
        
        mesh.userData = {
            originalPos: mesh.position.clone(),
            originalScale: 1,
            speed: config.speed,
            phase: Math.random() * Math.PI * 2,
            config: { ...config }
        };
        
        scene.add(mesh);
        models.push({ mesh, config: { ...config } });
    });
}

function startModelTransitions() {
    // Initial transition after 8 seconds
    setTimeout(() => {
        transitionToNextModel();
    }, 8000);
    
    // Then every 10-12 seconds
    setInterval(() => {
        if (!isTransitioning) {
            transitionToNextModel();
        }
    }, 10000 + Math.random() * 2000);
}

function transitionToNextModel() {
    if (isTransitioning || models.length === 0) return;
    
    isTransitioning = true;
    
    // Hide current model with fade out
    if (currentMainModel) {
        gsap.to(currentMainModel.mesh.material, {
            opacity: 0,
            duration: 1.8,
            ease: "power2.inOut",
            onComplete: () => {
                currentMainModel.mesh.visible = false;
            }
        });
        
        gsap.to(currentMainModel.mesh.scale, {
            x: 0.2,
            y: 0.2,
            z: 0.2,
            duration: 1.8,
            ease: "power2.inOut"
        });
    }
    
    // Get next model index
    const nextIndex = (modelIndex + 1) % models.length;
    
    // Small delay before showing next model
    setTimeout(() => {
        showModel(nextIndex);
        modelIndex = nextIndex;
        isTransitioning = false;
    }, 800);
}

function showModel(index) {
    if (!models[index]) return;
    
    currentMainModel = models[index];
    currentMainModel.mesh.visible = true;
    
    // Reset scale and opacity
    currentMainModel.mesh.scale.set(0.1, 0.1, 0.1);
    currentMainModel.mesh.material.opacity = 0;
    
    // Animate entrance
    gsap.to(currentMainModel.mesh.scale, {
        x: 1.2,
        y: 1.2,
        z: 1.2,
        duration: 2.5,
        ease: "elastic.out(1.2, 0.5)",
        delay: 0.3
    });
    
    gsap.to(currentMainModel.mesh.material, {
        opacity: currentMainModel.config.opacity,
        duration: 2,
        ease: "power2.out",
        delay: 0.3
    });
    
    // Pulsing emissive effect
    gsap.to(currentMainModel.mesh.material, {
        emissiveIntensity: currentMainModel.config.emissiveIntensity + 0.2,
        duration: 2,
        repeat: -1,
        yoyo: true,
        ease: "sine.inOut",
        delay: 1
    });
    
    // Add some camera movement
    if (!isMobile && window.innerWidth > 992) {
        gsap.to(camera.position, {
            x: Math.sin(time * 0.1) * 5,
            y: Math.cos(time * 0.1) * 3,
            duration: 3,
            ease: "power2.inOut"
        });
    }
}

function onWindowResize() {
    if (!camera || !renderer) return;
    
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    
    const newIsMobile = window.innerWidth <= 768;
    const pixelRatio = newIsMobile ? 1 : Math.min(window.devicePixelRatio, 2);
    renderer.setPixelRatio(pixelRatio);
}

function animateThreeJS() {
    if (!scene || !camera || !renderer) {
        requestAnimationFrame(animateThreeJS);
        return;
    }
    
    requestAnimationFrame(animateThreeJS);
    
    time += 0.012;
    
    // Animate main models
    models.forEach((model, index) => {
        if (model.mesh && model.mesh.visible) {
            const userData = model.mesh.userData;
            
            model.mesh.rotation.x = time * userData.config.rotationSpeed * 0.3;
            model.mesh.rotation.y = time * userData.config.rotationSpeed * 0.5;
            model.mesh.rotation.z = time * userData.config.rotationSpeed * 0.2;
            
            // Floating animation
            const floatY = Math.sin(time * userData.speed + userData.phase) * 2;
            const floatX = Math.cos(time * userData.speed * 0.7 + userData.phase) * 1.5;
            
            model.mesh.position.y = userData.originalPos.y + floatY;
            model.mesh.position.x = userData.originalPos.x + floatX;
            
            // Subtle scale pulsation
            const pulse = 1 + Math.sin(time * 1.2 + userData.phase) * 0.05;
            model.mesh.scale.setScalar(pulse);
        }
    });
    
    // Animate small floating particles
    scene.children.forEach(child => {
        if (child.userData && child.userData.speed) {
            child.position.x += Math.sin(time * child.userData.speed + child.userData.phase) * 0.1;
            child.position.y += Math.cos(time * child.userData.speed * 0.8 + child.userData.phase) * 0.1;
            child.position.z += Math.sin(time * child.userData.speed * 0.6 + child.userData.phase) * 0.1;
            
            // Keep particles in bounds
            if (Math.abs(child.position.x) > 40) child.position.x *= -0.9;
            if (Math.abs(child.position.y) > 40) child.position.y *= -0.9;
            if (Math.abs(child.position.z) > 40) child.position.z *= -0.9;
            
            // Pulsing opacity
            child.material.opacity = 0.3 + Math.sin(time * 2 + child.userData.phase) * 0.1;
        }
    });
    
    // Camera movement
    if (!isMobile && window.innerWidth > 992) {
        camera.position.x = Math.sin(time * 0.03) * 3;
        camera.position.y = Math.cos(time * 0.02) * 2;
        
        // Look at current model if visible
        if (currentMainModel && currentMainModel.mesh.visible) {
            const lookAt = currentMainModel.mesh.position.clone();
            camera.lookAt(lookAt);
        } else {
            camera.lookAt(0, 0, 0);
        }
    }
    
    if (controls) controls.update();
    renderer.render(scene, camera);
}

// Update the typing effect to trigger 3D transitions
class TypingEffect {
    constructor() {
        this.texts = [
            "WEB DEVELOPER",
            "FRONTEND DEVELOPER", 
            "JAVA DEVELOPER",
            "UI/UX DESIGNER",
            "CREATIVE CODER",
            "3D DEVELOPER"
        ];
        this.currentTextIndex = 0;
        this.currentCharIndex = 0;
        this.isDeleting = false;
        this.isPaused = false;
        this.pauseTime = 1000; // Increased pause time
        this.typeSpeed = 70;
        this.deleteSpeed = 40;
        this.typingText = document.getElementById('typing-text');
        this.cursor = document.getElementById('typing-cursor');
        this.startTyping();
    }

    startTyping() {
        setTimeout(() => this.type(), 1500); // Increased initial delay
    }

    type() {
        if (this.isPaused) {
            setTimeout(() => {
                this.isPaused = false;
                this.type();
            }, this.pauseTime);
            return;
        }

        const currentText = this.texts[this.currentTextIndex];
        
        if (this.isDeleting) {
            this.currentCharIndex--;
            this.typingText.textContent = currentText.substring(0, this.currentCharIndex);
            
            if (this.currentCharIndex === 0) {
                this.isDeleting = false;
                this.currentTextIndex = (this.currentTextIndex + 1) % this.texts.length;
                this.isPaused = false;
                this.typeSpeed = 70;
                this.deleteSpeed = 40;
                
                // Trigger 3D model transition on text change
                if (!isMobile) {
                    setTimeout(() => {
                        transitionToNextModel();
                        document.getElementById('three-container').classList.add('intense');
                        setTimeout(() => {
                            document.getElementById('three-container').classList.remove('intense');
                        }, 2000);
                    }, 300);
                }
            }
            
            setTimeout(() => this.type(), this.deleteSpeed);
        } else {
            this.currentCharIndex++;
            this.typingText.textContent = currentText.substring(0, this.currentCharIndex);
            
            if (!isMobile && this.currentCharIndex % 3 === 0) {
                document.getElementById('three-container').classList.add('intense');
                setTimeout(() => {
                    document.getElementById('three-container').classList.remove('intense');
                }, 100);
            }
            
            if (this.currentCharIndex === currentText.length) {
                this.isDeleting = true;
                this.isPaused = true;
                this.pauseTime = 800; // Reduced pause time
                
                if (!isMobile) {
                    document.getElementById('three-container').classList.add('intense');
                    setTimeout(() => {
                        document.getElementById('three-container').classList.remove('intense');
                    }, 500);
                }
            }
            
            setTimeout(() => this.type(), this.typeSpeed);
        }
    }
}

// Update hero animations to sync with 3D
const heroTimeline = gsap.timeline();
heroTimeline
    .from(".hero-sub", {
        opacity: 0,
        y: 30,
        duration: 1.5,
        ease: "power3.out",
        delay: 0.5 // Increased delay
    })
    .from("#typing-text", {
        opacity: 0,
        y: 50,
        scale: 0.9,
        duration: 2,
        ease: "power3.out",
        onStart: () => {
            typingEffect = new TypingEffect();
            
            if (!isMobile) {
                // Start with more intense 3D
                document.getElementById('three-container').classList.add('intense');
                gsap.to('#three-container', {
                    opacity: 0.95,
                    duration: 2.5,
                    ease: "power2.out"
                });
                
                // Trigger first model transition
                setTimeout(() => {
                    transitionToNextModel();
                }, 3000);
            }
        }
    }, "-=1.2")
    // ... (rest of hero animation code remains the same) ...

// Page load animations
window.addEventListener('load', () => {
    gsap.from('nav', {
        y: -40,
        opacity: 0,
        duration: 1.2,
        delay: 0.5, // Increased delay
        ease: "power3.out"
    });
    
    gsap.to('body', {
        opacity: 1,
        duration: 1,
        from: { opacity: 0 }
    });
    
    // Enhanced initial 3D sequence
    if (!isMobile) {
        setTimeout(() => {
            threeContainer.classList.add('intense');
            gsap.to(threeContainer, {
                opacity: 0.95,
                duration: 1.5
            });
            
            // Show first model with delay
            setTimeout(() => {
                modelIndex = 0;
                showModel(modelIndex);
            }, 800);
            
            // Enhanced effects
            setTimeout(() => {
                threeContainer.classList.remove('intense');
                gsap.to(threeContainer, {
                    opacity: 0.9,
                    duration: 2
                });
                
                // Start particle animation
                gsap.to(scene.children, {
                    duration: 3,
                    ease: "power2.out",
                    stagger: 0.05,
                    onUpdate: () => {
                        // Particle animation
                    }
                });
            }, 4000);
        }, 1500);
    }
});

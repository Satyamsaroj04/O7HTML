<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator UI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
           
            font-family: 'Segoe UI', sans-serif;
        }

        .calculator {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 320px;
            height: auto;
            background: #1e1e1e;
            border-radius: 20px;
            padding: 20px;
           
        }

        .header {
            width: 100%;
            height: 80px;
            background: #000;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .container1 {
            width: 100%;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .spaace {
            height: 15px;
        }

        .cont,
        .contc,
        .lower {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s ease;
            color: #fff;
        }

        .cont {
            width: 22%;
            height: 65px;
            background: #2b2b2b;
        }

        .cont:hover {
            background: #3a3a3a;
            transform: scale(1.05);
        }

        .contc {
            width: 22%;
            height: 65px;
            background: #e53935;
        }

        .contc:hover {
            background: #ff5252;
            transform: scale(1.05);
        }

        .lower {
            width: 100%;
            height: 65px;
            background: #4caf50;
            font-size: 30px;
        }

        .lower:hover {
            background: #66bb6a;
            transform: scale(1.03);
        }
    </style>
</head>

<body>

    <div class="calculator">
        <div class="container">

            <div class="header"></div>

            <div class="container1">
                <div class="cont">7</div>
                <div class="cont">8</div>
                <div class="cont">9</div>
                <div class="cont">/</div>
            </div>

            <div class="spaace"></div>

            <div class="container1">
                <div class="cont">4</div>
                <div class="cont">5</div>
                <div class="cont">6</div>
                <div class="cont">*</div>
            </div>

            <div class="spaace"></div>

            <div class="container1">
                <div class="cont">1</div>
                <div class="cont">2</div>
                <div class="cont">3</div>
                <div class="cont">-</div>
            </div>

            <div class="spaace"></div>

            <div class="container1">
                <div class="cont">.</div>
                <div class="cont">0</div>
                <div class="cont">+</div>
                <div class="contc">C</div>
            </div>

            <div class="spaace"></div>

            <div class="lower">=</div>

        </div>
    </div>

</body>

</html>

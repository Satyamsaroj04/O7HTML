        }

        .social-navbar .nav-link:hover {

        }

        /* Search input dark */
        .form-control {
            background-color: #111;
            color: #fff;
            border: 1px solid #444;
        }

        .form-control::placeholder {
            color: #bbb;
        }

        .form-control:focus {
            background-color: #111;
            color: #fff;
            border-color: #198754;
            box-shadow: none;
        }

        /* MENU text */

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Layout</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            margin: 0;
        }

        .box{
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
        }

        .h-80{ height: 80px; }
        .h-120{ height: 120px; }
        .min-h{ min-height: 100vh; }
    </style>
</head>
<body>

<div class="container-fluid min-h">

    <!-- 1 -->
    <div class="row">
        <div class="col-12 bg-danger ">1</div>
    </div>

    <!-- 2 | 3+4 | 5 -->
    <div class="row flex-grow-1">

        <!-- 2 -->
        <div class="col-md-2 bg-warning box">2</div>

        <!-- 3 & 4 -->
        <div class="col-md-8 p-0">
            <div class="row h-100">
                <div class="col-12 bg-info box">3</div>
                <div class="col-12 bg-success box">4</div>
            </div>
        </div>

        <!-- 5 -->
        <div class="col-md-2 bg-primary box text-white">5</div>

    </div>

    <!-- 6 | 7 -->
    <div class="row">
        <div class="col-md-8 bg-dark text-white h-120 box">6</div>
        <div class="col-md-4 bg-secondary h-120 box">7</div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

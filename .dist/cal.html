<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        .calculator {
            width: 100%;
            height: 700px;
            background-color: rgb(13, 201, 211);
            padding-top: 4%;
        }

        .container {
            width: 27%;
            height: 650px;
            background-color: rgb(37, 39, 39);
            
            padding-top: 4%;
            padding-left: 4%;
        }

        .header {
            width: 90%;
            height: 80px;
            background-color: rgb(107, 107, 104);
            border-radius: 1%;
        }


        .container1 {
            width: 90%;
            height: 80px;
            justify-content: space-between;
            display: flex;

        }

        .spaace {
            width: 90%;
            height: 20px;
        }

        .cont {
            width: 22%;
            height: 80px;
            background-color: rgb(168, 169, 180);
            font-size: 50px;
             border-radius: 25%;
        }

        .contc {
            width: 22%;
            height: 80px;
            background-color: rgb(16, 137, 87);
            font-size: 50px;
        }

        .lower {
            width: 90%;
            height: 80px;
            background-color: rgb(181, 31, 31);
            border-radius: 2%;
            font-size: 50px;
        }
    </style>
</head>

<body>
    <div class="row-fluid calculator">
        <div class="container" align="center ">
            <div class="header">
            </div>
            <div class="spaace"></div>
            <div class="container1">
                <div class="cont">7
                </div>
                <div class="cont">8
                </div>
                <div class="cont">9
                </div>
                <div class="cont">/
                </div>

            </div>
            <div class="spaace"></div>
            <div class="container1">
                <div class="cont">4
                </div>
                <div class="cont">5
                </div>
                <div class="cont">6
                </div>
                <div class="cont">*
                </div>

            </div>
            <div class="spaace"></div>
            <div class="container1">
                <div class="cont">1
                </div>
                <div class="cont">2
                </div>
                <div class="cont">3
                </div>
                <div class="cont">-
                </div>

            </div>
            <div class="spaace"></div>
            <div class="container1">
                <div class="cont">.
                </div>
                <div class="cont">0
                </div>
                <div class="cont">+
                </div>
                <div class="contc">C
                </div>

            </div>
            <div class="spaace"></div>
            <div class="lower">=
            </div>
        </div>



    </div>
    <script src=" https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>

</body>

</html>

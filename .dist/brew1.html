<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elexa Food Hub</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>
    .hero-img {
      height: 100vh;
      object-fit: cover;
    }
    .card img {
      height: 180px;
      object-fit: cover;
    }
  </style>
</head>

<body class="bg-black text-light">

<!-- 🔹 TOP NAVBAR -->
<nav class="navbar bg-black sticky-top">
  <div class="container-xl d-flex justify-content-between">
    <a class="navbar-brand" href="#">
      <img src="/elexa.png" height="45">
    </a>

    <div class="d-flex gap-3 fs-5">
      <i class="bi bi-facebook"></i>
      <i class="bi bi-instagram"></i>
      <i class="bi bi-snapchat"></i>
      <i class="bi bi-whatsapp"></i>
      <i class="bi bi-box-arrow-in-left"></i>
      <i class="bi bi-box-arrow-in-right"></i>
    </div>
  </div>
</nav>

<!-- 🔹 BRAND -->
<div class="text-center my-4">
  <h1 style="font-family:'Bebas Neue'; letter-spacing:6px;">
    BREW & BITE
  </h1>
</div>

<!-- 🔹 MENU -->
<nav class="navbar bg-black border-top border-secondary">
  <div class="container-xl">
    <ul class="navbar-nav flex-row gap-4">
      <li class="nav-item"><a class="nav-link text-light" href="#"><i class="bi bi-house-heart me-1"></i>Home</a></li>
      <li class="nav-item"><a class="nav-link text-light" href="#"><i class="bi bi-basket me-1"></i>Menu</a></li>
      <li class="nav-item"><a class="nav-link text-light" href="#"><i class="bi bi-file-person me-1"></i>About</a></li>
      <li class="nav-item"><a class="nav-link text-light" href="#"><i class="bi bi-gear me-1"></i>Services</a></li>
      <li class="nav-item"><a class="nav-link text-light" href="#"><i class="bi bi-person-lines-fill me-1"></i>Contact</a></li>
    </ul>

    <form class="d-flex ms-auto">
      <input class="form-control bg-dark text-light border-secondary me-2" placeholder="Search food">
      <button class="btn btn-outline-success">Search</button>
    </form>
  </div>
</nav>

<!-- 🔹 HERO SECTION 1 -->
<div class="position-relative">
  <img src="https://wallpapercave.com/wp/wp13916269.jpg" class="w-100 hero-img">

  <div class="container-xl position-absolute bottom-0 start-50 translate-middle-x mb-5">
    <div class="row g-4 justify-content-center">

      <!-- CARD -->
      <div class="col-lg-3 col-md-6">
        <div class="card bg-dark bg-opacity-75 border-0 text-center h-100">
          <img src="https://wallpapercave.com/uwp/uwp4863077.jpeg">
          <div class="card-body">
            <h5>PIZZA</h5>
            <p class="fs-5">
              <del class="text-danger">₹349</del>
              <span class="ms-2">₹289</span>
              <span class="badge bg-danger ms-2">25% OFF</span>
            </p>
            <button class="btn btn-success w-100">Order Now</button>
          </div>
        </div>
      </div>

      <div class="col-lg-3 col-md-6">
        <div class="card bg-dark bg-opacity-75 border-0 text-center h-100">
          <img src="https://wallpapercave.com/uwp/uwp4322060.png">
          <div class="card-body">
            <h5>BURGER</h5>
            <p class="fs-5">
              <del class="text-danger">₹99</del>
              <span class="ms-2">₹69</span>
              <span class="badge bg-danger ms-2">30% OFF</span>
            </p>
            <button class="btn btn-success w-100">Order Now</button>
          </div>
        </div>
      </div>

      <div class="col-lg-3 col-md-6">
        <div class="card bg-dark bg-opacity-75 border-0 text-center h-100">
          <img src="https://wallpapercave.com/wp/wp15189980.webp">
          <div class="card-body">
            <h5>SANDWICH</h5>
            <p class="fs-5">
              <del class="text-danger">₹249</del>
              <span class="ms-2">₹149</span>
              <span class="badge bg-danger ms-2">40% OFF</span>
            </p>
            <button class="btn btn-success w-100">Order Now</button>
          </div>
        </div>
      </div>

      <div class="col-lg-3 col-md-6">
        <div class="card bg-dark bg-opacity-75 border-0 text-center h-100">
          <img src="https://wallpapercave.com/wp/wp14278550.jpg">
          <div class="card-body">
            <h5>NOODLES</h5>
            <p class="fs-5">
              <del class="text-danger">₹189</del>
              <span class="ms-2">₹120</span>
              <span class="badge bg-danger ms-2">25% OFF</span>
            </p>
            <button class="btn btn-success w-100">Order Now</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- 🔹 ABOUT SECTION -->
<div class="position-relative">
  <img src="https://wallpapercave.com/wp/wp9571905.jpg" class="w-100 hero-img">

  <div class="container position-absolute top-50 start-50 translate-middle">
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="card bg-dark text-center">
          <img src="/selfie.jpg" class="card-img-top">
          <div class="card-body">
            <h5>About Me</h5>
            <p class="text-secondary">
              Passionate developer building modern cafe & food brand websites using Bootstrap.
            </p>
            <a href="#" class="btn btn-success w-100">Know More</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator UI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .calculator {
            width: 360px;
            background: #1e1e1e;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .display {
            height: 80px;
            background: #000;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .btn-cal {
            height: 65px;
            border-radius: 12px;
            font-size: 22px;
            border: none;
            transition: 0.2s ease;
        }

        .btn-cal:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .btn-number {
            background: #2b2b2b;
            color: #fff;
        }

        .btn-operator {
            background: #ff9800;
            color: #000;
        }

        .btn-clear {
            background: #e53935;
            color: #fff;
        }

        .btn-equal {
            background: #4caf50;
            color: #fff;
        }
    </style>
</head>

<body>

    <div class="calculator">
        <!-- Display -->
        <div class="display"></div>

        <!-- Buttons -->
        <div class="row g-2">
            <div class="col-3"><div class="btn btn-cal btn-number w-100">7</div></div>
            <div class="col-3"><div class="btn btn-cal btn-number w-100">8</div></div>
            <div class="col-3"><div class="btn btn-cal btn-number w-100">9</div></div>
            <div class="col-3"><div class="btn btn-cal btn-operator w-100">÷</div></div>

            <div class="col-3"><div class="btn btn-cal btn-number w-100">4</div></div>
            <div class="col-3"><div class="btn btn-cal btn-number w-100">5</div></div>
            <div class="col-3"><div class="btn btn-cal btn-number w-100">6</div></div>
            <div class="col-3"><div class="btn btn-cal btn-operator w-100">×</div></div>

            <div class="col-3"><div class="btn btn-cal btn-number w-100">1</div></div>
            <div class="col-3"><div class="btn btn-cal btn-number w-100">2</div></div>
            <div class="col-3"><div class="btn btn-cal btn-number w-100">3</div></div>
            <div class="col-3"><div class="btn btn-cal btn-operator w-100">−</div></div>

            <div class="col-3"><div class="btn btn-cal btn-number w-100">.</div></div>
            <div class="col-3"><div class="btn btn-cal btn-number w-100">0</div></div>
            <div class="col-3"><div class="btn btn-cal btn-operator w-100">+</div></div>
            <div class="col-3"><div class="btn btn-cal btn-clear w-100">C</div></div>

            <div class="col-12">
                <div class="btn btn-cal btn-equal w-100">=</div>
            </div>
        </div>
    </div>

</body>
</html>

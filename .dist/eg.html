<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Curved Text Example</title>
<style>
    svg {
        width: 100%;
        height: 200px;
    }
    text {
        fill: white;
        font-size: 40px;
        font-weight: bold;
        letter-spacing: 5px;
    }
    body {
        background: black;
    }
</style>
</head>
<body>

<svg viewBox="0 0 500 200">
    <!-- Curve Path -->
    <path id="curve" d="M 50 150 Q 250 20 450 150" fill="transparent"></path>

    <!-- Text on the curve -->
    <text>
        <textPath href="#curve" startOffset="50%" text-anchor="middle">
            NETFLIX ORIGINAL
        </textPath>
    </text>
</svg>

</body>
</html>

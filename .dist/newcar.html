<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container {
            width: 100%;
            height: 1000px;
            background-image: url("./greencar.png");
            background-size: cover;
            background-repeat: no-repeat;

        }

        #car {
            width: 650px;
            height: 500px;
            background-image: url("./greencar.png");
            background-size: cover;
            background-repeat: no-repeat;
            position: absolute;
            top: 60%;
            left: 900px;
            animation: move 5s linear;
        }

        #car {
            width: 650px;
            height: 500px;
            background-image: url("./greencar.png");
            background-size: cover;
            background-repeat: no-repeat;
            position: absolute;
            top: 60%;
            left: 900px;
            animation: move 5s linear;
        }

        #wheel1 {
            width: 80px;
            height: 80px;
            background-image: url("./greencar.png");
            background-size: cover;
            background-repeat: no-repeat;
            position: absolute;
            top: 680px;
            left: 1075px;
            animation: round1 5s linear;
        }

        #wheel2 {
            width: 80px;
            height: 80px;
            background-image: url("./greencar.png");
            background-size: cover;
            background-repeat: no-repeat;
            position: absolute;
            top: 680px;
            left: 1350px;
            animation: round2 5s linear;
        }

        @keyframes move {
            from {
                top: 60%;
                left: 900px;

            }

            to {
                top: 60%;
                left: 0px;
            }
        }

        @keyframes round1 {
            from {
                top: 680px;
                left: 1075px;
                transform: rotate(0deg);
            }

            to {
                top: 680px;
                left: 175px;
                transform: rotate(-360deg);
            }
        }

        @keyframes round2 {
            from {
                top: 680px;
                left: 1350px;

                transform: rotate(0deg);
            }

            to {
                top: 680px;
                left: 450px;
                transform: rotate(-360deg);
            }
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="car">
            <!-- <img src="./greencar.png" width="10%" height="100px"> -->
        </div>
        <div id="wheel1"></div>
        <div id="wheel2"></div>
    </div>

</body>

</html>

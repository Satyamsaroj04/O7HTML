<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  background: #ddd;
}

.login-box {
  width: 380px;
  padding: 40px;
  border-radius: 20px;
  background: white;
  box-shadow: 0 0 20px rgba(0,0,0,0.25);
  border: 4px solid transparent;
  background-clip: padding-box, border-box;
  background-image:
    linear-gradient(white, white),
    linear-gradient(45deg, #4b73ff, #d42cff);
}

.login-box h2 {
  text-align: center;
  font-size: 32px;
  margin-top: 0;
  margin-bottom: 35px;
}

.login-box input {
  width: 100%;
  border: none;
  border-bottom: 2px solid gray;
  outline: none;
  font-size: 17px;
  padding: 6px;
  margin-bottom: 25px;
}

.login-box a {
  text-decoration: none;
  font-size: 15px;
}

.login-box .forgot {
  display: block;
  margin-bottom: 20px;
}

.login-btn {
  width: 100%;
  padding: 12px;
  font-size: 18px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
  background: rgb(235, 235, 235);
  border: 2px solid black;
  margin-bottom: 20px;
}

.signup {
  text-align: center;
  font-size: 16px;
}
.signup a {
  text-decoration: none;
  color: blue;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Login</h2>
  
  <form>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <a href="#" class="forgot">Forget Password?</a>

    <button class="login-btn">Login</button>
  </form>

  <p class="signup">Not a Member ? <a href="#">Signup</a></p>
</div>

</body>
</html>
